<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BASS LAB</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06060f;
      font-family: 'Courier New', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 28px; padding: 20px;
    }
    h1 { font-size: 11px; color: #444; letter-spacing: 6px; }
    .presets { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    .preset-btn {
      padding: 10px 20px; border-radius: 4px; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 11px; letter-spacing: 3px;
      border: 1px solid; background: transparent;
      transition: all 0.1s; user-select: none;
    }
    .preset-btn.active { opacity: 1; }
    .preset-btn:not(.active) { opacity: 0.4; }
    canvas { border: 1px solid #0e0e1e; border-radius: 3px; }
    .keys { display: flex; gap: 3px; }
    .key {
      width: 50px; height: 120px; background: #09091a;
      border: 1px solid #111122; border-radius: 4px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-end; padding-bottom: 12px;
      user-select: none; transition: all 0.04s;
    }
    .key.active { box-shadow: 0 0 20px var(--key-color, #fff3); }
    .note { font-size: 10px; color: #1e1e2e; margin-bottom: 4px; }
    .key.active .note { color: var(--key-color, #fff); }
    .kb   { font-size: 9px; color: #141424; }
    .key.active .kb { color: #ffffff44; }
    .info { font-size: 10px; color: #1a1a2a; letter-spacing: 3px; }
    .desc-box {
      font-size: 10px; color: #333; letter-spacing: 2px;
      text-align: center; min-height: 16px; transition: color 0.2s;
    }
  </style>
</head>
<body>
  <h1>⚡ BASS LAB</h1>

  <div class="presets" id="presets"></div>
  <div class="desc-box" id="desc"></div>
  <canvas id="scope" width="440" height="80"></canvas>
  <div class="keys" id="keyboard"></div>
  <div class="info">A S D F G H J K L</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// 5 basses — architectures différentes
// ─────────────────────────────────────────────────────────────────────────────

const PRESETS = [
  {
    id: "sub808",
    name: "808",
    color: "#e03030",
    desc: "Trap 808 — sine + pitch slide + distorsion douce",
  },
  {
    id: "reese",
    name: "REESE",
    color: "#4080ff",
    desc: "DnB Reese — saws désaccordés + filtre mouvant",
  },
  {
    id: "acid",
    name: "ACID",
    color: "#80ff30",
    desc: "TB-303 — square + filtre resonant sweep + accent",
  },
  {
    id: "sub",
    name: "SUB",
    color: "#a060ff",
    desc: "Sub pur — sine + sous-harmonique + warmth",
  },
  {
    id: "growl",
    name: "GROWL",
    color: "#ff8030",
    desc: "Dubstep growl — saw + LFO filtre + waveshaper",
  },
];

const NOTES = [
  {note:"C1",midi:24},{note:"D1",midi:26},{note:"E1",midi:28},
  {note:"F1",midi:29},{note:"G1",midi:31},{note:"A1",midi:33},
  {note:"B1",midi:35},{note:"C2",midi:36},{note:"D2",midi:38},
];
const KB = {"a":"C1","s":"D1","d":"E1","f":"F1","g":"G1","h":"A1","j":"B1","k":"C2","l":"D2"};
const midi2f = m => 440 * Math.pow(2, (m - 69) / 12);

let ctx = null, analyser = null;
let currentPreset = PRESETS[0];
const active = {};

function getCtx() {
  if (!ctx) {
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = ctx.createAnalyser(); analyser.fftSize = 2048;
    analyser.connect(ctx.destination);
  }
  if (ctx.state === "suspended") ctx.resume();
  return ctx;
}

// ─────────────────────────────────────────────────────────────────────────────
// SYNTHÈSES
// ─────────────────────────────────────────────────────────────────────────────

function synth_808(c, freq, now, oscs, masterGain) {
  // ── 808 Trap Bass ──────────────────────────────────────────────────────────
  // Technique : sine pur + pitch slide descendant (caracteristique 808)
  //             Distorsion douce (tanh) pour l'épaisseur
  //             Sub octave en dessous pour le poids

  // Pitch slide : commence une octave au-dessus, descend en ~80ms
  const sine = c.createOscillator();
  sine.type = "sine";
  sine.frequency.setValueAtTime(freq * 2, now);
  sine.frequency.exponentialRampToValueAtTime(freq, now + 0.08);

  // Distorsion douce (tanh) — donne la chaleur sans agressivité
  const ws = c.createWaveShaper();
  const curve = new Float32Array(512);
  for (let i = 0; i < 512; i++) {
    const x = (i / 256) - 1;
    curve[i] = Math.tanh(x * 2.5) * 0.8;
  }
  ws.curve = curve;

  // Sub octave pure (fondamentale grave = poids physique)
  const sub = c.createOscillator();
  sub.type = "sine"; sub.frequency.value = freq * 0.5;
  const subG = c.createGain(); subG.gain.value = 0.25;
  sub.connect(subG); subG.connect(masterGain); sub.start(); oscs.push(sub);

  // Envelope : attaque quasi-instantanée, decay rapide sur le click, sustain long
  const envG = c.createGain();
  envG.gain.setValueAtTime(0.85, now);
  envG.gain.exponentialRampToValueAtTime(0.001, now + 4.5); // longue queue 808

  sine.connect(ws); ws.connect(envG); envG.connect(masterGain);
  sine.start(); oscs.push(sine);

  // Passe-bas pour couper le hiss de la distorsion
  const lp = c.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = freq * 6;
  ws.connect(lp); lp.connect(envG);
}

function synth_reese(c, freq, now, oscs, masterGain) {
  // ── Reese Bass (Reese Project — DnB) ─────────────────────────────────────
  // 3 saws désaccordés → filtre LP resonant → LFO lent → masterGain

  // Passe-bas resonant (tout passe dedans avant le master)
  const lp = c.createBiquadFilter();
  lp.type = "lowpass"; lp.Q.value = 5; lp.frequency.value = freq * 4;
  lp.connect(masterGain);

  // LFO lent sur la fréquence du filtre (mouvement organique)
  const lfo = c.createOscillator(); const lfoG = c.createGain();
  lfo.type = "sine"; lfo.frequency.value = 0.28;
  lfoG.gain.value = freq * 3;
  lfo.connect(lfoG); lfoG.connect(lp.frequency);
  lfo.start(); oscs.push(lfo);

  // 3 saws désaccordés → lp
  [-10, 0, +10].forEach((cents, i) => {
    const f = freq * Math.pow(2, cents / 1200);
    const saw = c.createOscillator(); saw.type = "sawtooth"; saw.frequency.value = f;
    const g = c.createGain(); g.gain.value = i === 1 ? 0.40 : 0.28;
    saw.connect(g); g.connect(lp);
    saw.start(); oscs.push(saw);
  });

  // Sub sine propre en dessous (fondation grave)
  const sub = c.createOscillator(); sub.type = "sine"; sub.frequency.value = freq;
  const subG = c.createGain(); subG.gain.value = 0.22;
  sub.connect(subG); subG.connect(masterGain);
  sub.start(); oscs.push(sub);
}

function synth_acid(c, freq, now, oscs, masterGain) {
  // ── TB-303 Acid Bass ──────────────────────────────────────────────────────
  // Technique : square/saw + filtre passe-bas resonant sweep rapide
  //             Accent = pic de filtre à l'attaque (characteristique 303)
  //             Decay du filtre exponentiel = "wah" typique

  const sq = c.createOscillator();
  sq.type = "sawtooth"; sq.frequency.value = freq;

  // Filtre 303 : resonant, sweep rapide
  const lp = c.createBiquadFilter();
  lp.type = "lowpass"; lp.Q.value = 18; // Q très élevé = caractère acide prononcé

  // Sweep du filtre : accent fort (ouverture instantanée) + decay rapide
  const cutoffBase = freq * 1.5;
  lp.frequency.setValueAtTime(freq * 12, now);          // ouverture accent
  lp.frequency.exponentialRampToValueAtTime(cutoffBase, now + 0.35); // decay acide

  // Envelope amplitude : attaque dure, decay
  const envG = c.createGain();
  envG.gain.setValueAtTime(0.0, now);
  envG.gain.linearRampToValueAtTime(0.90, now + 0.005); // click d'attaque 303
  envG.gain.exponentialRampToValueAtTime(0.50, now + 0.10);

  // Sub sinewave pour le poids (la 303 originale était légère en sub)
  const sub = c.createOscillator(); sub.type = "sine"; sub.frequency.value = freq;
  const subG = c.createGain(); subG.gain.value = 0.20;
  sub.connect(subG); subG.connect(masterGain); sub.start(); oscs.push(sub);

  sq.connect(lp); lp.connect(envG); envG.connect(masterGain);
  sq.start(); oscs.push(sq);
}

function synth_sub(c, freq, now, oscs, masterGain) {
  // ── Sub Bass pur ──────────────────────────────────────────────────────────
  // Technique : sine pur + sous-harmonique (freq/2) + légère saturation tube
  //             Warmth filter (passe-bas doux) pour retirer le digital froid
  //             2nd harmonique très légère = donne de la "couleur" à l'écoute

  // Fondamentale sine (le vrai sub — senti plus qu'entendu)
  const fund = c.createOscillator(); fund.type = "sine"; fund.frequency.value = freq;
  const fundG = c.createGain(); fundG.gain.value = 0.65;

  // Sous-harmonique (octave -1) — poids et profondeur extrême
  const sub = c.createOscillator(); sub.type = "sine"; sub.frequency.value = freq * 0.5;
  const subG = c.createGain(); subG.gain.value = 0.30;

  // 2e harmonique très légère pour l'audibilité sur petites enceintes
  const h2 = c.createOscillator(); h2.type = "sine"; h2.frequency.value = freq * 2;
  const h2G = c.createGain(); h2G.gain.value = 0.06;

  // Warmth : saturation tube douce (tanh très doux)
  const ws = c.createWaveShaper();
  const curve = new Float32Array(512);
  for (let i = 0; i < 512; i++) {
    const x = (i / 256) - 1;
    curve[i] = Math.tanh(x * 1.2) * 0.92; // très doux = chaleur sans distorsion
  }
  ws.curve = curve;

  // Passe-bas final doux (retire tout artefact digital)
  const lp = c.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = freq * 5; lp.Q.value = 0.5;

  fund.connect(fundG); fundG.connect(ws);
  sub.connect(subG);   subG.connect(ws);
  h2.connect(h2G);     h2G.connect(ws);
  ws.connect(lp); lp.connect(masterGain);

  fund.start(); sub.start(); h2.start();
  oscs.push(fund, sub, h2);
}

function synth_growl(c, freq, now, oscs, masterGain) {
  // ── Growl Bass (Dubstep) ──────────────────────────────────────────────────
  // Technique : saw + square (superposition) → filtre resonant LFO rapide
  //             Waveshaper fort (distorsion créative) = mid agressif
  //             LFO filtre synchronisé (vitesse bpm-like = groove)

  // Saw + square = spectre dense, agressif
  const saw = c.createOscillator(); saw.type = "sawtooth"; saw.frequency.value = freq;
  const sq  = c.createOscillator(); sq.type  = "square";   sq.frequency.value  = freq * 1.002; // micro-détune
  const sawG = c.createGain(); sawG.gain.value = 0.50;
  const sqG  = c.createGain(); sqG.gain.value  = 0.30;

  // Waveshaper agressif (clip dur = mid grinçant typique growl)
  const ws = c.createWaveShaper();
  const curve = new Float32Array(512);
  for (let i = 0; i < 512; i++) {
    const x = (i / 256) - 1;
    curve[i] = Math.max(-0.75, Math.min(0.75, x * 4.5)); // clip fort
  }
  ws.curve = curve;

  // Filtre resonant agressif (Q élevé = cri du growl)
  const lp = c.createBiquadFilter(); lp.type = "lowpass"; lp.Q.value = 14;
  lp.frequency.value = freq * 2;

  // LFO sur le filtre (~4 Hz = tempo dubstep typique 140 BPM/2)
  const lfo = c.createOscillator(); const lfoG = c.createGain();
  lfo.type = "sine"; lfo.frequency.value = 4.2;
  lfoG.gain.value = freq * 8; // sweep large
  lfo.connect(lfoG); lfoG.connect(lp.frequency); lfo.start(); oscs.push(lfo);

  // Sub sine propre en parallèle (le growl tient son sub dessous)
  const sub = c.createOscillator(); sub.type = "sine"; sub.frequency.value = freq;
  const subG = c.createGain(); subG.gain.value = 0.30;
  sub.connect(subG); subG.connect(masterGain); sub.start(); oscs.push(sub);

  saw.connect(sawG); sq.connect(sqG);
  sawG.connect(ws); sqG.connect(ws);
  ws.connect(lp); lp.connect(masterGain);

  saw.start(); sq.start(); oscs.push(saw, sq);
}

// ─────────────────────────────────────────────────────────────────────────────
// PLAY / STOP
// ─────────────────────────────────────────────────────────────────────────────

function playNote(noteObj) {
  const key = noteObj.note;
  if (active[key]) return;
  const c = getCtx();
  const freq = midi2f(noteObj.midi);
  const now = c.currentTime;
  const oscs = [];

  const masterGain = c.createGain();
  masterGain.gain.setValueAtTime(0, now);
  masterGain.gain.linearRampToValueAtTime(0.7, now + (currentPreset.id === "sub808" ? 0.005 : 0.01));
  masterGain.connect(analyser);

  switch (currentPreset.id) {
    case "sub808": synth_808(c, freq, now, oscs, masterGain);   break;
    case "reese":  synth_reese(c, freq, now, oscs, masterGain); break;
    case "acid":   synth_acid(c, freq, now, oscs, masterGain);  break;
    case "sub":    synth_sub(c, freq, now, oscs, masterGain);   break;
    case "growl":  synth_growl(c, freq, now, oscs, masterGain); break;
  }

  active[key] = { oscs, masterGain };
  const el = document.querySelector(`[data-note="${key}"]`);
  if (el) { el.classList.add("active"); el.style.setProperty("--key-color", currentPreset.color); }
}

function stopNote(key) {
  const node = active[key]; if (!node) return;
  const { oscs, masterGain } = node;
  const t = ctx.currentTime;
  masterGain.gain.cancelScheduledValues(t);
  masterGain.gain.setValueAtTime(masterGain.gain.value, t);
  const rel = currentPreset.id === "sub808" ? 1.8 :
              currentPreset.id === "sub"    ? 1.2 : 0.4;
  masterGain.gain.linearRampToValueAtTime(0, t + rel);
  setTimeout(() => oscs.forEach(o => { try { o.stop(); } catch(e){} }), (rel + 0.2) * 1000);
  delete active[key];
  document.querySelector(`[data-note="${key}"]`)?.classList.remove("active");
}

// ─────────────────────────────────────────────────────────────────────────────
// UI
// ─────────────────────────────────────────────────────────────────────────────

// Preset buttons
const presetsEl = document.getElementById("presets");
PRESETS.forEach(pr => {
  const btn = document.createElement("button");
  btn.className = "preset-btn" + (pr.id === currentPreset.id ? " active" : "");
  btn.textContent = pr.name;
  btn.style.color = pr.color;
  btn.style.borderColor = pr.color + "66";
  btn.addEventListener("click", () => {
    // Stop all active notes
    Object.keys(active).forEach(k => stopNote(k));
    currentPreset = pr;
    document.getElementById("desc").textContent = pr.desc;
    document.getElementById("desc").style.color = pr.color + "aa";
    document.querySelectorAll(".preset-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });
  presetsEl.appendChild(btn);
});
document.getElementById("desc").textContent = PRESETS[0].desc;
document.getElementById("desc").style.color = PRESETS[0].color + "aa";

// Keyboard
const kbKeys = Object.keys(KB);
NOTES.forEach((n, i) => {
  const div = document.createElement("div");
  div.className = "key"; div.dataset.note = n.note;
  div.innerHTML = `<div class="note">${n.note}</div><div class="kb">${kbKeys[i] || ""}</div>`;
  div.addEventListener("mousedown",  () => playNote(n));
  div.addEventListener("mouseup",    () => stopNote(n.note));
  div.addEventListener("mouseleave", () => stopNote(n.note));
  document.getElementById("keyboard").appendChild(div);
});

window.addEventListener("keydown", e => {
  if (e.repeat) return;
  const n = KB[e.key.toLowerCase()]; if (!n) return;
  const obj = NOTES.find(x => x.note === n); if (obj) playNote(obj);
});
window.addEventListener("keyup", e => {
  const n = KB[e.key.toLowerCase()]; if (n) stopNote(n);
});

// Oscilloscope
const cv = document.getElementById("scope");
const sc = cv.getContext("2d");
(function draw() {
  requestAnimationFrame(draw);
  sc.fillStyle = "#04040d"; sc.fillRect(0, 0, cv.width, cv.height);
  if (!analyser) {
    sc.strokeStyle = "#ffffff08"; sc.lineWidth = 1;
    sc.beginPath(); sc.moveTo(0, 40); sc.lineTo(440, 40); sc.stroke(); return;
  }
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(buf);
  const col = currentPreset.color;
  sc.strokeStyle = col; sc.lineWidth = 1.5;
  sc.shadowColor = col; sc.shadowBlur = 8;
  sc.beginPath();
  buf.forEach((v, i) => {
    const x = (i / buf.length) * cv.width;
    const y = ((v / 128) - 1) * (cv.height / 2) + cv.height / 2;
    i === 0 ? sc.moveTo(x, y) : sc.lineTo(x, y);
  });
  sc.stroke();
})();
</script>
</body>
</html>
