<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NUTS — Voice Synth</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #06060f;
      font-family: 'Courier New', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 22px;
    }
    .label { font-size: 10px; color: #e03030; letter-spacing: 6px; }
    .name  { font-size: 52px; font-weight: bold; color: #e03030; letter-spacing: 10px; text-shadow: 0 0 40px #e0303055; }
    .desc  { font-size: 10px; color: #2a2a3a; letter-spacing: 3px; }
    canvas { border: 1px solid #0e0e1e; border-radius: 3px; }
    .keys  { display: flex; gap: 3px; }
    .key {
      width: 48px; height: 115px; background: #09091a;
      border: 1px solid #111122; border-radius: 4px; cursor: pointer;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-end; padding-bottom: 12px;
      user-select: none; transition: all 0.05s;
    }
    .key.active { background: #e0303012; border-color: #e0303055; box-shadow: 0 0 20px #e0303028; }
    .note { font-size: 10px; color: #1e1e2e; margin-bottom: 4px; }
    .key.active .note { color: #e03030aa; }
    .kb   { font-size: 9px; color: #141424; }
    .key.active .kb { color: #e0303055; }
    .info { font-size: 10px; color: #1a1a2a; letter-spacing: 3px; }
  </style>
</head>
<body>
  <div class="label">🎤 VOICE SYNTH</div>
  <div class="name">NUTS</div>
  <div class="desc">haunted soft voice — lil peep</div>
  <canvas id="scope" width="430" height="80"></canvas>
  <div class="keys" id="keyboard"></div>
  <div class="info">A S D F G H J K L — maintenir pour sustain</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// Architecture inspirée de :
//   • Cantor (Synapse Audio) — modèle tube vocal en série
//   • LF model (Fant 1985)  — pulse glottal asymétrique
//   • Alter/Ego (Plogue)    — aspiration pulse-synchrone
//   • VOCALOID              — vibrato naturel avec variation de taux
//
// Signal chain :
//
//   Glottal (LF wave)
//       │
//       ├── WaveShaper (rectifier) ──→ noiseAM.gain  ←── Noise buffer
//       │                                  │
//       │                               AspHP/LP ──→ sumNode
//       │
//       ├── Series peaking EQ (F1→F5)                ──→ sumNode
//       │   [tube vocal = passe-tout de chaque section]
//       │
//       └── Fundamental sine boost                   ──→ sumNode
//
//   sumNode → Lip radiation (highshelf) → Reverb (convolution) → out
//
// La différence clé vs bandpass parallèles :
//   Le signal traverse les formants EN SÉRIE (comme dans un vrai tube vocal).
//   Chaque formant interagit avec les autres = couplage acoustique naturel.
// ─────────────────────────────────────────────────────────────────────────────

const NOTES = [
  {note:"C3",midi:48},{note:"D3",midi:50},{note:"E3",midi:52},
  {note:"F3",midi:53},{note:"G3",midi:55},{note:"A3",midi:57},
  {note:"B3",midi:59},{note:"C4",midi:60},{note:"D4",midi:62},
];
const KB = {"a":"C3","s":"D3","d":"E3","f":"F3","g":"G3","h":"A3","j":"B3","k":"C4","l":"D4"};
const midi2f = m => 440 * Math.pow(2, (m - 69) / 12);

let ctx = null, analyser = null, reverbNode = null, dryBus = null, wetBus = null;
const active = {};

// ── Contexte + reverb (créés une seule fois) ─────────────────────────────────
function getCtx() {
  if (ctx) { if (ctx.state === "suspended") ctx.resume(); return ctx; }

  ctx = new (window.AudioContext || window.webkitAudioContext)();
  analyser = ctx.createAnalyser(); analyser.fftSize = 2048;
  analyser.connect(ctx.destination);

  // Reverb à convolution — IR plate (dense, long, cold) ─────────────────────
  // Inspiré du "plate reverb" utilisé sur les tracks Lil Peep
  const SR = ctx.sampleRate;
  const dur = 3.2;
  const len = Math.floor(SR * dur);
  const ir = ctx.createBuffer(2, len, SR);
  for (let ch = 0; ch < 2; ch++) {
    const d = ir.getChannelData(ch);
    let prev = 0;
    for (let i = 0; i < len; i++) {
      const t = i / SR;
      // Pre-delay 12ms + exponentielle dense (plate = très diffus rapidement)
      const env = t < 0.012 ? 0 :
                  t < 0.040 ? (t - 0.012) / 0.028 :  // attaque douce
                  Math.pow(1 - (i - 0.04 * SR) / (len - 0.04 * SR), 2.8);
      // Bruit légèrement filtré (pas blanc pur = plate moins granuleux)
      const raw = (Math.random() * 2 - 1) * env;
      prev = prev * 0.35 + raw * 0.65; // passe-bas 1er ordre = densification
      d[i] = prev;
    }
  }
  reverbNode = ctx.createConvolver(); reverbNode.buffer = ir;

  // Mix bus : dry 55% + wet 45%
  dryBus = ctx.createGain(); dryBus.gain.value = 0.55;
  wetBus = ctx.createGain(); wetBus.gain.value = 0.45;
  reverbNode.connect(wetBus);
  dryBus.connect(analyser); wetBus.connect(analyser);

  ctx.resume();
  return ctx;
}

// ── LF glottal wave (modèle de Liljencrants-Fant simplifié) ──────────────────
// Le pulse glottal RÉEL est asymétrique : ouverture lente (t_p) / fermeture rapide (t_e)
// Cela change radicalement le spectre vs sawtooth symétrique
function makeLFWave(c) {
  const N = 256;
  const real = new Float32Array(N + 1);
  const imag = new Float32Array(N + 1);

  // Paramètres LF (valeurs typiques voix masculine, mode "modal" = saine)
  // Normalisés sur une période [0, 1]
  const tp = 0.40;   // instant du pic (ouverture)
  const te = 0.72;   // instant de fermeture rapide
  const ta = 0.06;   // durée de retour (return phase)

  // On échantillonne le pulse LF et on extrait les harmoniques par FFT manuelle
  const SAMP = 4096;
  const pulse = new Float32Array(SAMP);
  for (let i = 0; i < SAMP; i++) {
    const t = i / SAMP;
    if (t < te) {
      // Phase d'ouverture-fermeture : sinusoïde filtrée
      pulse[i] = Math.sin(Math.PI * t / tp) *
                 Math.exp(-Math.PI * Math.abs(t - tp) / te);
    } else {
      // Phase de retour (fermeture lente) : exponentielle
      pulse[i] = -Math.exp(-(t - te) / ta) * 0.3;
    }
  }

  // DFT des N premiers harmoniques
  for (let n = 1; n <= N; n++) {
    let re = 0, im = 0;
    for (let i = 0; i < SAMP; i++) {
      const ang = 2 * Math.PI * n * i / SAMP;
      re += pulse[i] * Math.cos(ang);
      im += pulse[i] * Math.sin(ang);
    }
    real[n] = re / SAMP;
    imag[n] = im / SAMP;
  }

  return c.createPeriodicWave(real, imag, { disableNormalization: false });
}

// ── Vibrato naturel (variation de taux = humain) ─────────────────────────────
function addVibrato(c, freqTarget, baseFreq, now, oscs) {
  const vib = c.createOscillator(); const vibG = c.createGain();
  vib.type = "sine"; vib.frequency.value = 5.0;
  vibG.gain.setValueAtTime(0, now);
  vibG.gain.linearRampToValueAtTime(baseFreq * 0.009, now + 1.1);
  vib.connect(vibG); vibG.connect(freqTarget);
  vib.start(); oscs.push(vib);

  // Le taux de vibrato lui-même varie (0.18 Hz) = "vibrato humain" vs "LFO parfait"
  const vibMod = c.createOscillator(); const vibModG = c.createGain();
  vibMod.type = "sine"; vibMod.frequency.value = 0.18;
  vibModG.gain.value = 0.55;
  vibMod.connect(vibModG); vibModG.connect(vib.frequency);
  vibMod.start(); oscs.push(vibMod);

  // Jitter (micro-irrégularités ~11 Hz, très faibles)
  const jit = c.createOscillator(); const jitG = c.createGain();
  jit.type = "sine"; jit.frequency.value = 11.5 + Math.random() * 2.5;
  jitG.gain.value = baseFreq * 0.0013;
  jit.connect(jitG); jitG.connect(freqTarget);
  jit.start(); oscs.push(jit);
}

// ── Synthèse d'une voix ───────────────────────────────────────────────────────
function buildVoice(c, freq, gain, delayMs, now, lfWave, oscs) {
  // Source glottale LF
  const src = c.createOscillator();
  src.setPeriodicWave(lfWave);
  src.frequency.value = freq;
  src.start(); oscs.push(src);

  addVibrato(c, src.frequency, freq, now, oscs);

  // ── Aspiration pulse-synchrone (clé de la différence avec un pad) ──────────
  // Technique : rectifier le signal glottal → utiliser comme AM sur le bruit
  // → le souffle "pulse" à chaque fermeture glottale = comme une vraie voix
  const rectifier = c.createWaveShaper();
  const rCurve = new Float32Array(512);
  for (let i = 0; i < 512; i++) {
    const x = (i / 256) - 1;
    rCurve[i] = Math.max(0, x * 1.5); // demi-onde redressée amplifiée
  }
  rectifier.curve = rCurve;
  src.connect(rectifier);

  const nLen = c.sampleRate * 3;
  const nBuf = c.createBuffer(1, nLen, c.sampleRate);
  const nd = nBuf.getChannelData(0);
  for (let i = 0; i < nLen; i++) nd[i] = Math.random() * 2 - 1;
  const noise = c.createBufferSource(); noise.buffer = nBuf; noise.loop = true;

  const noiseAM = c.createGain(); noiseAM.gain.value = 0; // contrôlé par le rectifier
  rectifier.connect(noiseAM.gain); // connexion audio-rate !
  noise.connect(noiseAM);

  // Filtre du bruit (autour de F1-F2 = fuite glottale)
  const nBP = c.createBiquadFilter(); nBP.type = "bandpass";
  nBP.frequency.value = Math.min(800, freq * 2); nBP.Q.value = 1.5;
  const nG = c.createGain(); nG.gain.value = 0.055 * gain;
  noiseAM.connect(nBP); nBP.connect(nG);
  noise.start(); oscs.push(noise);

  // ── Formants EN SÉRIE (modèle tube vocal — Cantor / LPC) ───────────────────
  // Le signal traverse chaque formant l'un après l'autre.
  // Chaque peaking EQ = une résonance de section du conduit vocal.
  // BW = F/Q (valeurs Peterson & Barney, voix masculine, voyelle "ʌ" = "NUTS")
  const FORM = [
    // [freq_Hz, Q=F/BW, gain_dB]
    [Math.min(650,  freq*2.2), 650/80,   14],  // F1 pharynx     BW≈80Hz
    [Math.min(1080, freq*4.0), 1080/100, 13],  // F2 bouche      BW≈100Hz
    [Math.min(2400, freq*8.0), 2400/160, 11],  // F3 brillance   BW≈160Hz
    [Math.min(3300, freq*11.), 3300/200,  8],  // F4 présence    BW≈200Hz
    [Math.min(4000, freq*13.), 4000/280,  5],  // F5 brillance+  BW≈280Hz
  ];

  let chain = src; // le signal traverse chaque EQ en série
  FORM.forEach(([fq, Q, gainDb]) => {
    const eq = c.createBiquadFilter();
    eq.type = "peaking";
    eq.frequency.value = fq;
    eq.Q.value = Q;
    eq.gain.value = gainDb;
    chain.connect(eq);
    chain = eq; // sortie de ce filtre = entrée du suivant
  });

  // Fundamental boost explicite (voix = f0 très présent, souvent perdu en synthèse)
  const fundSine = c.createOscillator(); const fundG = c.createGain();
  fundSine.type = "sine"; fundSine.frequency.value = freq;
  fundG.gain.value = 0.12 * gain;
  fundSine.connect(fundG); fundSine.start(); oscs.push(fundSine);

  // Sous-résonance trachéale (~250-300 Hz = chaleur grave vocale)
  const trachBP = c.createBiquadFilter(); trachBP.type = "peaking";
  trachBP.frequency.value = Math.min(270, freq); trachBP.Q.value = 4; trachBP.gain.value = 8;

  // Délai inter-voix
  const dly = c.createDelay(0.05); dly.delayTime.value = delayMs / 1000;
  const vGain = c.createGain(); vGain.gain.value = gain;

  chain.connect(trachBP); trachBP.connect(dly);
  fundG.connect(dly);
  nG.connect(dly);
  dly.connect(vGain);

  return vGain;
}

function playNote(noteObj) {
  const key = noteObj.note;
  if (active[key]) return;
  const c = getCtx();
  const baseFreq = midi2f(noteObj.midi);
  const now = c.currentTime;
  const oscs = [];

  const master = c.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.42, now + 0.38);

  // Lip radiation filter (lèvres = +6dB/oct au-dessus de ~3kHz)
  // Donne la "brillance" frontale de la voix, différencie la gorge des lèvres
  const lipRad = c.createBiquadFilter();
  lipRad.type = "highshelf"; lipRad.frequency.value = 3000; lipRad.gain.value = 4.5;
  master.connect(lipRad);
  lipRad.connect(dryBus);
  lipRad.connect(reverbNode);

  // Shimmer (variation d'amplitude ~5Hz = vie)
  const shim = c.createOscillator(); const shimG = c.createGain();
  shim.type = "sine"; shim.frequency.value = 4.9;
  shimG.gain.value = 0.025;
  shim.connect(shimG); shimG.connect(master.gain);
  shim.start(); oscs.push(shim);

  // Pré-calcul de la wave LF (coûteux, fait une fois par note)
  const lfWave = makeLFWave(c);

  // 4 voix désaccordées — ensemble vocal (légère asymétrie = battements naturels)
  const voices = [
    { cents: -7,  delay: 0,    gain: 0.32 },
    { cents:  0,  delay: 8,    gain: 0.38 },
    { cents: +6,  delay: 15,   gain: 0.28 },
    { cents: -2,  delay: 22,   gain: 0.26 },
  ];

  voices.forEach(({ cents, delay, gain }) => {
    const f = baseFreq * Math.pow(2, cents / 1200);
    const vNode = buildVoice(c, f, gain, delay, now, lfWave, oscs);
    vNode.connect(master);
  });

  active[key] = { oscs, master };
  document.querySelector(`[data-note="${key}"]`)?.classList.add("active");
}

function stopNote(key) {
  const node = active[key]; if (!node) return;
  const { oscs, master } = node;
  const t = ctx.currentTime;
  master.gain.cancelScheduledValues(t);
  master.gain.setValueAtTime(master.gain.value, t);
  master.gain.linearRampToValueAtTime(0, t + 2.2);
  setTimeout(() => oscs.forEach(o => { try { o.stop(); } catch(e){} }), 2400);
  delete active[key];
  document.querySelector(`[data-note="${key}"]`)?.classList.remove("active");
}

// ── Oscilloscope ─────────────────────────────────────────────────────────────
const cv = document.getElementById("scope");
const sc = cv.getContext("2d");
(function draw() {
  requestAnimationFrame(draw);
  sc.fillStyle = "#04040d"; sc.fillRect(0, 0, cv.width, cv.height);
  if (!analyser) {
    sc.strokeStyle = "#e0303018"; sc.lineWidth = 1;
    sc.beginPath(); sc.moveTo(0, 40); sc.lineTo(430, 40); sc.stroke(); return;
  }
  const buf = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(buf);
  sc.strokeStyle = "#e03030"; sc.lineWidth = 1.5;
  sc.shadowColor = "#e03030"; sc.shadowBlur = 10;
  sc.beginPath();
  buf.forEach((v, i) => {
    const x = (i / buf.length) * cv.width;
    const y = ((v / 128) - 1) * (cv.height / 2) + cv.height / 2;
    i === 0 ? sc.moveTo(x, y) : sc.lineTo(x, y);
  });
  sc.stroke();
})();

// ── Clavier ──────────────────────────────────────────────────────────────────
const kbKeys = Object.keys(KB);
NOTES.forEach((n, i) => {
  const div = document.createElement("div");
  div.className = "key"; div.dataset.note = n.note;
  div.innerHTML = `<div class="note">${n.note}</div><div class="kb">${kbKeys[i] || ""}</div>`;
  div.addEventListener("mousedown",  () => playNote(n));
  div.addEventListener("mouseup",    () => stopNote(n.note));
  div.addEventListener("mouseleave", () => stopNote(n.note));
  document.getElementById("keyboard").appendChild(div);
});
window.addEventListener("keydown", e => {
  if (e.repeat) return;
  const n = KB[e.key.toLowerCase()]; if (!n) return;
  const obj = NOTES.find(x => x.note === n); if (obj) playNote(obj);
});
window.addEventListener("keyup", e => {
  const n = KB[e.key.toLowerCase()]; if (n) stopNote(n);
});
</script>
</body>
</html>
